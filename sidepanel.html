<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk to Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- SVG Definitions - Dumb Ways to Die style -->
  <svg style="display: none;">
    <defs>
      <symbol id="face-smug" viewBox="0 0 80 100">
        <path d="M12 50 Q8 25 30 15 Q50 8 62 20 Q75 35 70 55 Q68 75 55 88 Q40 98 25 88 Q10 78 12 50Z" fill="#FF7A50"/>
        <ellipse cx="30" cy="42" rx="5" ry="3" fill="#2D2A26"/>
        <ellipse cx="52" cy="40" rx="5" ry="3" fill="#2D2A26"/>
        <path d="M46 32 Q54 28 62 32" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M28 58 Q38 68 52 60" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="28" cy="94" rx="7" ry="5" fill="#E5673D"/>
        <ellipse cx="52" cy="92" rx="7" ry="5" fill="#E5673D"/>
      </symbol>

      <symbol id="face-thinking" viewBox="0 0 80 100">
        <path d="M18 48 Q15 22 38 12 Q60 5 72 25 Q82 48 72 68 Q60 90 40 95 Q18 98 10 75 Q5 58 18 48Z" fill="#FF7A50"/>
        <circle cx="32" cy="38" r="7" fill="#FFFFFF"/>
        <circle cx="56" cy="36" r="6" fill="#FFFFFF"/>
        <circle cx="35" cy="36" r="3.5" fill="#2D2A26"/>
        <circle cx="58" cy="34" r="3" fill="#2D2A26"/>
        <path d="M22 28 Q32 22 42 28" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="42" cy="64" rx="6" ry="7" fill="#2D2A26"/>
        <ellipse cx="30" cy="96" rx="7" ry="5" fill="#E5673D"/>
        <ellipse cx="54" cy="94" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-character">
        <svg viewBox="0 0 80 100" width="32" height="40"><use href="#face-smug"/></svg>
      </div>
      <div class="header-info">
        <h1 class="header-title">Jesty</h1>
        <p class="header-status" id="status">Ready to argue</p>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chat-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-character">
          <svg viewBox="0 0 80 100" width="52" height="65"><use href="#face-smug"/></svg>
        </div>
        <p class="empty-text">Open a new tab to get roasted, then come back here to argue.</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Talk back to Jesty..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>
          <svg><use href="#icon-send"/></svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk to Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- SVG Definitions - Dumb Ways to Die style -->
  <svg style="display: none;">
    <defs>
      <symbol id="face-smug" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <circle cx="28" cy="45" r="4" fill="#2D2A26"/>
        <circle cx="52" cy="45" r="4" fill="#2D2A26"/>
        <path d="M46 36 Q52 33 58 35" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M28 62 Q40 72 52 62" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <symbol id="face-thinking" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <circle cx="28" cy="44" r="5" fill="#FFFFFF"/>
        <circle cx="52" cy="44" r="5" fill="#FFFFFF"/>
        <circle cx="30" cy="42" r="2.5" fill="#2D2A26"/>
        <circle cx="54" cy="42" r="2.5" fill="#2D2A26"/>
        <path d="M18 36 Q28 32 38 36" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="40" cy="68" r="5" fill="#2D2A26"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-character">
        <svg viewBox="0 0 80 100" width="32" height="40"><use href="#face-smug"/></svg>
      </div>
      <div class="header-info">
        <h1 class="header-title">Jesty</h1>
        <p class="header-status" id="status">Ready to argue</p>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chat-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-character">
          <svg viewBox="0 0 80 100" width="52" height="65"><use href="#face-smug"/></svg>
        </div>
        <p class="empty-text">Open a new tab to get roasted, then come back here to argue.</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Talk back to Jesty..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>
          <svg><use href="#icon-send"/></svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk to Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- SVG Definitions -->
  <svg style="display: none;">
    <defs>
      <symbol id="face-smug" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="26" fill="#FF8C5A"/>
        <circle cx="28" cy="28" r="23" fill="#FFAB7D"/>
        <ellipse cx="20" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <ellipse cx="36" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <path d="M33 19 Q36 17 40 18" stroke="#2D2A26" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M20 34 Q28 38 36 33" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </symbol>

      <symbol id="face-thinking" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="26" fill="#FF8C5A"/>
        <circle cx="28" cy="28" r="23" fill="#FFAB7D"/>
        <ellipse cx="20" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <ellipse cx="36" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <path d="M14 20 Q18 18 22 20" stroke="#2D2A26" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="30" cy="35" r="4" fill="#2D2A26"/>
      </symbol>

      <symbol id="face-sassy" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="26" fill="#FF8C5A"/>
        <circle cx="28" cy="28" r="23" fill="#FFAB7D"/>
        <ellipse cx="20" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <ellipse cx="36" cy="24" rx="3" ry="2" fill="#2D2A26"/>
        <path d="M33 18 L40 16" stroke="#2D2A26" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M22 34 Q28 37 34 34" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </symbol>

      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-character">
        <svg viewBox="0 0 56 56" width="40" height="40"><use href="#face-smug"/></svg>
      </div>
      <div class="header-info">
        <h1 class="header-title">Jesty</h1>
        <p class="header-status" id="status">Ready to argue</p>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chat-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-character">
          <svg viewBox="0 0 56 56" width="64" height="64"><use href="#face-smug"/></svg>
        </div>
        <p class="empty-text">Open a new tab to get roasted, then come back here to argue.</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Talk back to Jesty..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>
          <svg><use href="#icon-send"/></svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

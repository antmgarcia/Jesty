<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="focus-island.css">
</head>
<body>
  <div class="island" id="island">
    <div class="island-actions">
      <button class="island-action-btn island-eye" id="island-eye">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="island-action-label">Side panel</span>
      </button>
      <button class="island-action-btn island-pencil" id="island-pencil">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span class="island-action-label">Write a note</span>
      </button>
    </div>
    <div class="island-row">
      <div class="island-face" id="island-face"></div>
      <div class="island-badge" id="island-badge">0:00</div>
      <div class="island-expand">
        <button class="island-end" id="island-end">End focus</button>
      </div>
    </div>
  </div>
  <script src="theme.js"></script>
  <script src="characters.js"></script>
  <script src="focus-island.js"></script>
</body>
</html>

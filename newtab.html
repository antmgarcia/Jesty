<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- SVG Character Definitions - Dumb Ways to Die style -->
  <svg style="display: none;">
    <defs>
      <!-- Smug face -->
      <symbol id="face-smug" viewBox="0 0 80 100">
        <!-- Bean/pill body -->
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Simple dot eyes -->
        <circle cx="28" cy="45" r="4" fill="#2D2A26"/>
        <circle cx="52" cy="45" r="4" fill="#2D2A26"/>
        <!-- Raised eyebrow -->
        <path d="M46 36 Q52 33 58 35" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Smug smirk -->
        <path d="M28 62 Q40 72 52 62" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Tiny legs -->
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Suspicious/skeptical face -->
      <symbol id="face-suspicious" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- One squinted eye, one open -->
        <path d="M22 45 Q28 42 34 45" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="52" cy="45" r="5" fill="#2D2A26"/>
        <circle cx="53" cy="44" r="1.5" fill="#FF7A50"/>
        <!-- Flat skeptical mouth -->
        <path d="M28 64 L52 64" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Yikes/awkward face -->
      <symbol id="face-yikes" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Wide worried eyes -->
        <circle cx="28" cy="45" r="6" fill="#FFFFFF"/>
        <circle cx="52" cy="45" r="6" fill="#FFFFFF"/>
        <circle cx="28" cy="45" r="3" fill="#2D2A26"/>
        <circle cx="52" cy="45" r="3" fill="#2D2A26"/>
        <!-- Wavy nervous mouth -->
        <path d="M25 65 Q32 60 40 65 Q48 70 55 65" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Eye roll face -->
      <symbol id="face-eyeroll" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Eyes rolled up -->
        <circle cx="28" cy="44" r="6" fill="#FFFFFF"/>
        <circle cx="52" cy="44" r="6" fill="#FFFFFF"/>
        <circle cx="28" cy="40" r="3" fill="#2D2A26"/>
        <circle cx="52" cy="40" r="3" fill="#2D2A26"/>
        <!-- Unimpressed mouth -->
        <path d="M30 66 Q40 62 50 66" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Disappointed face -->
      <symbol id="face-disappointed" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Sad droopy eyes -->
        <circle cx="28" cy="46" r="4" fill="#2D2A26"/>
        <circle cx="52" cy="46" r="4" fill="#2D2A26"/>
        <!-- Worried eyebrows -->
        <path d="M20 38 Q28 42 36 40" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M44 40 Q52 42 60 38" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Sad frown -->
        <path d="M28 68 Q40 60 52 68" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Melting/overwhelmed face -->
      <symbol id="face-melting" viewBox="0 0 80 100">
        <!-- Droopy melting body -->
        <ellipse cx="40" cy="58" rx="34" ry="40" fill="#FF7A50"/>
        <ellipse cx="25" cy="90" rx="10" ry="6" fill="#FF7A50"/>
        <ellipse cx="55" cy="88" rx="8" ry="5" fill="#FF7A50"/>
        <!-- X eyes -->
        <path d="M22 42 L34 52 M34 42 L22 52" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M46 42 L58 52 M58 42 L46 52" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Wavy distressed mouth -->
        <path d="M26 68 Q33 72 40 68 Q47 64 54 68" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </symbol>

      <!-- Dead face -->
      <symbol id="face-dead" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- X eyes -->
        <path d="M20 40 L36 54 M36 40 L20 54" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M44 40 L60 54 M60 40 L44 54" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Flat dead mouth -->
        <path d="M28 70 L52 70" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Ghost wisp -->
        <path d="M55 15 Q62 10 58 3" stroke="#FFB499" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Thinking/loading face -->
      <symbol id="face-thinking" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Looking up eyes -->
        <circle cx="28" cy="44" r="5" fill="#FFFFFF"/>
        <circle cx="52" cy="44" r="5" fill="#FFFFFF"/>
        <circle cx="30" cy="42" r="2.5" fill="#2D2A26"/>
        <circle cx="54" cy="42" r="2.5" fill="#2D2A26"/>
        <!-- Thinking raised eyebrow -->
        <path d="M18 36 Q28 32 38 36" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Small "o" thinking mouth -->
        <circle cx="40" cy="68" r="5" fill="#2D2A26"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Search icon -->
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>

      <!-- Refresh icon -->
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <!-- Chat icon -->
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Top Right Links -->
  <div class="top-links">
    <a href="https://mail.google.com" class="top-link">Gmail</a>
    <a href="https://www.google.com" class="top-link">Google</a>
  </div>

  <div class="container">
    <!-- Hero Jesty Section -->
    <div class="hero-section">
      <div class="hero-character" id="character">
        <svg><use href="#face-thinking"/></svg>
      </div>

      <div class="hero-content" id="jesty-card">
        <p id="joke-text" class="hero-quote hidden"></p>
        <p id="loading-text" class="hero-loading">Reading your tabs...</p>
      </div>

      <div class="hero-actions hidden" id="jesty-actions">
        <button id="talkback-btn" class="action-btn" title="Talk back to Jesty">
          <svg><use href="#icon-chat"/></svg>
        </button>
        <button id="refresh-btn" class="action-btn" title="Get another roast">
          <svg><use href="#icon-refresh"/></svg>
        </button>
      </div>

      <p class="tab-count" id="tab-count"></p>
    </div>

    <!-- Search Section (minimal, bottom) -->
    <div class="search-section">
      <form id="search-form" class="search-form">
        <div class="search-box">
          <svg class="search-icon"><use href="#icon-search"/></svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search Google"
            autocomplete="off"
          >
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="newtab.js"></script>
</body>
</html>

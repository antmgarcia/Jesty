<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link href="fonts/dm-sans.css" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- Page-specific icons (shared character/accessory SVGs injected by characters.js) -->
  <svg style="display: none;">
    <defs>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-share" viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="19" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Top Left (Level + Accessory Mini-Slots) -->
  <div class="top-bar-left" id="top-bar-left">
    <button class="level-badge" id="level-badge" title="Level">
      <svg class="level-ring" viewBox="0 0 36 36" width="32" height="32">
        <circle cx="18" cy="18" r="15" fill="none" stroke="var(--jesty-border)" stroke-width="2.5"/>
        <circle class="level-ring-fill" id="level-ring-fill" cx="18" cy="18" r="15" fill="none" stroke="#EAB308" stroke-width="2.5"
          stroke-dasharray="94.25" stroke-dashoffset="94.25" stroke-linecap="round" transform="rotate(-90 18 18)"/>
      </svg>
      <span class="level-badge-num" id="level-badge-num">1</span>
    </button>
    <div class="acc-mini-slot" id="acc-mini-hat" title="Hat"></div>
    <div class="acc-mini-slot" id="acc-mini-glasses" title="Glasses"></div>
    <button class="acc-mini-add" id="acc-mini-add" title="Accessories">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>

  <!-- Level Panel (tooltip) -->
  <div class="level-panel hidden" id="level-panel">
    <div class="level-panel-header">
      <span class="level-panel-title" id="level-panel-title">Level 1</span>
      <span class="level-panel-stage" id="level-panel-stage">Suspect</span>
    </div>
    <div class="level-panel-progress">
      <div class="level-panel-bar">
        <div class="level-panel-fill" id="level-panel-fill" style="width: 0%"></div>
      </div>
      <span class="level-panel-xp" id="level-panel-xp">0 / 100 XP</span>
    </div>
    <button class="level-panel-play" id="level-panel-next">Play to level up</button>
  </div>

  <!-- Top Right Links -->
  <div class="top-links">
    <a href="https://mail.google.com" class="top-link">Gmail</a>
    <a href="https://www.google.com" class="top-link">Google</a>
  </div>

  <div class="container">
    <!-- Hero Jesty Section -->
    <div class="hero-section">
      <div class="hero-character" id="character">
        <svg viewBox="-15 -10 150 140" width="120" height="112"><use href="#face-thinking"/></svg>
      </div>

      <div class="hero-content" id="jesty-card">
        <p id="joke-text" class="hero-quote hidden"></p>
        <p id="hero-cta" class="hero-cta hidden">Plead Guilty for unlimited roasts</p>
        <p id="loading-text" class="hero-loading">Reading your tabs...</p>

        <div id="welcome-prompt" class="welcome-prompt hidden">
          <p class="welcome-heading">What should I call you?</p>
          <div class="welcome-row">
            <input type="text" id="welcome-name" class="welcome-name-input" placeholder="Your name" autocomplete="off" maxlength="20" autofocus>
            <button id="welcome-submit" class="welcome-submit">Go</button>
          </div>
          <div class="welcome-color-faces" id="welcome-colors"></div>
          <button id="welcome-skip" class="welcome-skip">Skip</button>
        </div>
      </div>

      <div class="hero-actions hidden" id="jesty-actions">
        <button id="talkback-btn" class="action-btn" title="Talk back to Jesty">
          <svg><use href="#icon-chat"/></svg>
        </button>
        <div class="share-wrapper">
          <button id="share-btn" class="action-btn" title="Share this roast">
            <svg><use href="#icon-share"/></svg>
          </button>
          <div class="share-menu hidden" id="share-menu">
            <button class="share-option" data-action="copy">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy image
            </button>
            <button class="share-option" data-action="twitter">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Share to X
            </button>
            <button class="share-option" data-action="download">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </button>
          </div>
        </div>
        <button id="refresh-btn" class="action-btn" title="Get another roast">
          <svg><use href="#icon-refresh"/></svg>
        </button>
      </div>

    </div>

    <!-- Search Section (minimal, bottom) -->
    <div class="search-section">
      <form id="search-form" class="search-form">
        <div class="search-box">
          <svg class="search-icon"><use href="#icon-search"/></svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search Google"
            autocomplete="off"
          >
        </div>
      </form>
    </div>

    <!-- Tasks hint (below top-bar-left) -->
    <div class="newtab-tasks hidden" id="newtab-tasks">
      <div class="newtab-tasks-list" id="newtab-tasks-list"></div>
    </div>

    <div class="tab-info">
      <p class="tab-count" id="tab-count"></p>
      <span class="info-dot">·</span>
      <p class="roasts-remaining" id="roasts-remaining"></p>
    </div>
  </div>

  <!-- Tab Manager Grid (replaces main content when "XX tabs open" clicked) -->
  <div class="tab-manager hidden" id="tab-manager">
    <div class="tab-manager-header">
      <div class="tab-manager-header-row">
        <button class="tab-manager-back" id="tab-manager-back">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
      </div>
      <div class="tab-manager-title">
        <span class="tab-manager-count" id="tab-manager-count">0 tabs</span>
        <span class="tab-manager-quip" id="tab-manager-quip"></span>
      </div>
    </div>
    <div class="tab-manager-grid" id="tab-manager-grid"></div>

  </div>

  <!-- Upgrade Panel (replaces main content when "XX roasts left" clicked) -->
  <div class="upgrade-panel hidden" id="upgrade-panel">
    <div class="tab-manager-header">
      <div class="tab-manager-header-row">
        <button class="tab-manager-back" id="upgrade-panel-back">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div></div>
      </div>
      <div class="tab-manager-title">
        <span class="tab-manager-count" id="upgrade-panel-count"></span>
        <span class="tab-manager-quip" id="upgrade-panel-quip"></span>
      </div>
    </div>
    <div class="upgrade-panel-cards" id="upgrade-panel-cards"></div>
  </div>

  <!-- Focus Blur Overlay (shown during focus when blur is enabled) -->
  <div class="focus-blur-overlay hidden" id="newtab-focus-blur"></div>

  <!-- Focus Island iframe (shown during active focus session) -->
  <iframe class="focus-island-iframe hidden" id="focus-island-iframe"
    src="focus-island.html" allow="transparency"
    style="position:fixed;bottom:0;left:0;width:320px;height:220px;border:none;z-index:2147483647;background:transparent;pointer-events:auto;overflow:visible;color-scheme:only light;"></iframe>

  <footer class="privacy-footer">
    Your tabs are processed locally and never stored.
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </footer>

  <script src="theme.js"></script>
  <script src="characters.js"></script>
  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="premium.js"></script>
  <script src="accessories.js"></script>
  <script src="calendar.js"></script>
  <script src="roast-engine.js"></script>
  <script src="newtab.js"></script>
</body>
</html>

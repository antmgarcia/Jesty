<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- Page-specific icons (shared character/accessory SVGs injected by characters.js) -->
  <svg style="display: none;">
    <defs>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-share" viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="19" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Top Right Links -->
  <div class="top-links">
    <a href="https://mail.google.com" class="top-link">Gmail</a>
    <a href="https://www.google.com" class="top-link">Google</a>
  </div>

  <div class="container">
    <!-- Hero Jesty Section -->
    <div class="hero-section">
      <div class="hero-character" id="character">
        <svg viewBox="-15 -10 150 140"><use href="#face-thinking"/></svg>
      </div>

      <div class="hero-content" id="jesty-card">
        <p id="joke-text" class="hero-quote hidden"></p>
        <p id="hero-cta" class="hero-cta hidden">Plead Guilty for unlimited roasts</p>
        <p id="loading-text" class="hero-loading">Reading your tabs...</p>

        <!-- Welcome prompt (shown once on first launch) -->
        <div id="welcome-prompt" class="welcome-prompt hidden">
          <p class="welcome-heading">What should I call you?</p>
          <div class="welcome-row">
            <input type="text" id="welcome-name" class="welcome-name-input" placeholder="Your name" autocomplete="off" maxlength="20" autofocus>
            <button id="welcome-submit" class="welcome-submit">Go</button>
          </div>
          <div class="welcome-color-faces" id="welcome-colors"></div>
          <button id="welcome-skip" class="welcome-skip">Skip</button>
        </div>
      </div>

      <div class="hero-actions hidden" id="jesty-actions">
        <button id="talkback-btn" class="action-btn" title="Talk back to Jesty">
          <svg><use href="#icon-chat"/></svg>
        </button>
        <button id="share-btn" class="action-btn" title="Share this roast">
          <svg><use href="#icon-share"/></svg>
        </button>
        <button id="refresh-btn" class="action-btn" title="Get another roast">
          <svg><use href="#icon-refresh"/></svg>
        </button>
      </div>

    </div>

    <!-- Search Section (minimal, bottom) -->
    <div class="search-section">
      <form id="search-form" class="search-form">
        <div class="search-box">
          <svg class="search-icon"><use href="#icon-search"/></svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search Google"
            autocomplete="off"
          >
        </div>
      </form>
    </div>

    <div class="tab-info">
      <p class="tab-count" id="tab-count"></p>
      <span class="info-dot">·</span>
      <p class="roasts-remaining" id="roasts-remaining"></p>
    </div>
  </div>

  <footer class="privacy-footer">
    Your tabs are processed locally and never stored.
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </footer>

  <script src="characters.js"></script>
  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="premium.js"></script>
  <script src="accessories.js"></script>
  <script src="calendar.js"></script>
  <script src="roast-engine.js"></script>
  <script src="newtab.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- SVG Character Definitions - Dumb Ways to Die style -->
  <svg style="display: none;">
    <defs>
      <!-- Smug face -->
      <symbol id="face-smug" viewBox="0 0 80 100">
        <!-- Dynamic blob body - slight lean -->
        <path d="M12 50 Q8 25 30 15 Q50 8 62 20 Q75 35 70 55 Q68 75 55 88 Q40 98 25 88 Q10 78 12 50Z" fill="#FF7A50"/>
        <!-- Cheeky eyes - half closed -->
        <ellipse cx="30" cy="42" rx="5" ry="3" fill="#2D2A26"/>
        <ellipse cx="52" cy="40" rx="5" ry="3" fill="#2D2A26"/>
        <!-- Raised eyebrow -->
        <path d="M46 32 Q54 28 62 32" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Smug smirk - asymmetric -->
        <path d="M28 58 Q38 68 52 60" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Tiny legs -->
        <ellipse cx="28" cy="94" rx="7" ry="5" fill="#E5673D"/>
        <ellipse cx="52" cy="92" rx="7" ry="5" fill="#E5673D"/>
      </symbol>

      <!-- Suspicious/skeptical face -->
      <symbol id="face-suspicious" viewBox="0 0 80 100">
        <!-- Leaning back blob -->
        <path d="M15 55 Q10 30 28 18 Q48 5 65 22 Q78 40 72 60 Q65 82 50 90 Q32 98 20 85 Q8 72 15 55Z" fill="#FF7A50"/>
        <!-- One squinted, one wide -->
        <path d="M22 42 Q30 38 38 44" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="55" cy="40" r="6" fill="#FFFFFF"/>
        <circle cx="56" cy="39" r="3" fill="#2D2A26"/>
        <!-- Skeptical flat mouth -->
        <path d="M30 62 Q40 60 50 64" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="28" cy="94" rx="7" ry="5" fill="#E5673D"/>
        <ellipse cx="54" cy="93" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Yikes/awkward face -->
      <symbol id="face-yikes" viewBox="0 0 80 100">
        <!-- Tense, slightly squished blob -->
        <path d="M10 52 Q8 28 32 16 Q52 8 68 24 Q80 42 72 62 Q62 85 45 92 Q25 98 14 80 Q6 68 10 52Z" fill="#FF7A50"/>
        <!-- Wide worried eyes -->
        <circle cx="28" cy="40" r="8" fill="#FFFFFF"/>
        <circle cx="54" cy="38" r="8" fill="#FFFFFF"/>
        <circle cx="30" cy="42" r="4" fill="#2D2A26"/>
        <circle cx="56" cy="40" r="4" fill="#2D2A26"/>
        <!-- Teeth-gritting mouth -->
        <path d="M26 62 L54 60" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M30 62 L30 58 M38 61 L38 57 M46 60 L46 56" stroke="#2D2A26" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="26" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="52" cy="94" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Eye roll face -->
      <symbol id="face-eyeroll" viewBox="0 0 80 100">
        <!-- Slouchy annoyed blob -->
        <path d="M14 48 Q12 22 35 14 Q55 8 68 25 Q78 45 70 65 Q60 88 42 94 Q22 98 12 78 Q6 62 14 48Z" fill="#FF7A50"/>
        <!-- Eyes rolled up -->
        <circle cx="30" cy="38" r="7" fill="#FFFFFF"/>
        <circle cx="54" cy="36" r="7" fill="#FFFFFF"/>
        <circle cx="30" cy="34" r="3.5" fill="#2D2A26"/>
        <circle cx="54" cy="32" r="3.5" fill="#2D2A26"/>
        <!-- Unimpressed slight frown -->
        <path d="M28 64 Q40 58 52 62" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="28" cy="96" rx="7" ry="4" fill="#E5673D"/>
        <ellipse cx="52" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Disappointed face -->
      <symbol id="face-disappointed" viewBox="0 0 80 100">
        <!-- Droopy sad blob -->
        <path d="M16 50 Q14 25 36 15 Q56 8 68 28 Q76 48 68 68 Q58 90 40 95 Q20 98 12 75 Q8 60 16 50Z" fill="#FF7A50"/>
        <!-- Sad droopy eyes -->
        <ellipse cx="30" cy="42" rx="5" ry="6" fill="#2D2A26"/>
        <ellipse cx="52" cy="44" rx="5" ry="6" fill="#2D2A26"/>
        <!-- Sad eyebrows -->
        <path d="M20 34 Q28 38 38 36" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M44 38 Q54 40 62 36" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Sad frown -->
        <path d="M28 68 Q40 58 52 66" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="28" cy="96" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="96" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Melting/overwhelmed face -->
      <symbol id="face-melting" viewBox="0 0 80 100">
        <!-- Melting droopy blob -->
        <path d="M12 45 Q10 22 35 14 Q58 8 70 30 Q78 50 72 70 Q68 85 58 92 Q48 98 35 96 Q15 94 8 78 Q4 62 12 45Z" fill="#FF7A50"/>
        <!-- Drip -->
        <ellipse cx="18" cy="92" rx="8" ry="6" fill="#FF7A50"/>
        <ellipse cx="62" cy="88" rx="6" ry="5" fill="#FF7A50"/>
        <!-- Spiral/dizzy eyes -->
        <circle cx="28" cy="40" r="6" fill="none" stroke="#2D2A26" stroke-width="2.5"/>
        <circle cx="28" cy="40" r="2" fill="#2D2A26"/>
        <circle cx="54" cy="42" r="6" fill="none" stroke="#2D2A26" stroke-width="2.5"/>
        <circle cx="54" cy="42" r="2" fill="#2D2A26"/>
        <!-- Wavy overwhelmed mouth -->
        <path d="M26 65 Q34 70 42 65 Q50 60 56 66" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </symbol>

      <!-- Dead face -->
      <symbol id="face-dead" viewBox="0 0 80 100">
        <!-- Flat deflated blob -->
        <path d="M10 55 Q8 30 32 18 Q54 10 70 30 Q80 50 72 70 Q62 90 42 95 Q20 98 10 75 Q5 62 10 55Z" fill="#FF7A50"/>
        <!-- X eyes -->
        <path d="M22 36 L36 50 M36 36 L22 50" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M46 36 L60 50 M60 36 L46 50" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Flat dead mouth with tongue -->
        <path d="M30 70 L52 68" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="54" cy="72" rx="4" ry="6" fill="#FF5A5A"/>
        <!-- Ghost wisp -->
        <path d="M58 10 Q66 5 62 -2" stroke="#FFB499" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
        <ellipse cx="28" cy="96" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="52" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Thinking/loading face -->
      <symbol id="face-thinking" viewBox="0 0 80 100">
        <!-- Curious leaning blob -->
        <path d="M18 48 Q15 22 38 12 Q60 5 72 25 Q82 48 72 68 Q60 90 40 95 Q18 98 10 75 Q5 58 18 48Z" fill="#FF7A50"/>
        <!-- Looking up/side eyes -->
        <circle cx="32" cy="38" r="7" fill="#FFFFFF"/>
        <circle cx="56" cy="36" r="6" fill="#FFFFFF"/>
        <circle cx="35" cy="36" r="3.5" fill="#2D2A26"/>
        <circle cx="58" cy="34" r="3" fill="#2D2A26"/>
        <!-- One raised eyebrow -->
        <path d="M22 28 Q32 22 42 28" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Small "o" thinking mouth -->
        <ellipse cx="42" cy="64" rx="6" ry="7" fill="#2D2A26"/>
        <ellipse cx="30" cy="96" rx="7" ry="5" fill="#E5673D"/>
        <ellipse cx="54" cy="94" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Search icon -->
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>

      <!-- Refresh icon -->
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <!-- Chat icon -->
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Top Right Links -->
  <div class="top-links">
    <a href="https://mail.google.com" class="top-link">Gmail</a>
    <a href="https://www.google.com" class="top-link">Google</a>
  </div>

  <div class="container">
    <!-- Hero Jesty Section -->
    <div class="hero-section">
      <div class="hero-character" id="character">
        <svg><use href="#face-thinking"/></svg>
      </div>

      <div class="hero-content" id="jesty-card">
        <p id="joke-text" class="hero-quote hidden"></p>
        <p id="loading-text" class="hero-loading">Reading your tabs...</p>
      </div>

      <div class="hero-actions hidden" id="jesty-actions">
        <button id="talkback-btn" class="action-btn" title="Talk back to Jesty">
          <svg><use href="#icon-chat"/></svg>
        </button>
        <button id="refresh-btn" class="action-btn" title="Get another roast">
          <svg><use href="#icon-refresh"/></svg>
        </button>
      </div>

      <p class="tab-count" id="tab-count"></p>
    </div>

    <!-- Search Section (minimal, bottom) -->
    <div class="search-section">
      <form id="search-form" class="search-form">
        <div class="search-box">
          <svg class="search-icon"><use href="#icon-search"/></svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search Google"
            autocomplete="off"
          >
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="newtab.js"></script>
</body>
</html>

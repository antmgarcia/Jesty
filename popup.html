<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG Character Definitions - Fluid geometric style with arms -->
  <svg style="display: none;">
    <defs>
      <!-- Happy/Fed face - arms up celebrating -->
      <symbol id="face-happy" viewBox="-10 -5 120 115">
        <!-- Body - bouncy fluid blob -->
        <path d="M25 22 Q52 10 75 22 Q92 38 88 58 Q82 82 62 88 Q40 95 22 85 Q8 70 12 48 Q15 30 25 22Z" fill="#FF7A50"/>
        <!-- Legs - bouncy -->
        <line x1="35" y1="85" x2="28" y2="100" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <line x1="65" y1="86" x2="72" y2="100" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="26" cy="102" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="74" cy="102" rx="6" ry="4" fill="#E5673D"/>
        <!-- Arms - raised celebrating -->
        <line x1="15" y1="45" x2="2" y2="25" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <line x1="85" y1="42" x2="98" y2="22" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <circle cx="0" cy="23" r="5" fill="#E5673D"/>
        <circle cx="100" cy="20" r="5" fill="#E5673D"/>
        <!-- Face -->
        <path d="M30 42 Q40 32 50 42" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M52 40 Q62 30 72 40" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M32 60 Q50 78 68 60" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Rosy cheeks -->
        <circle cx="25" cy="55" r="5" fill="#FF8FA3" opacity="0.6"/>
        <circle cx="75" cy="52" r="5" fill="#FF8FA3" opacity="0.6"/>
        <!-- Sparkles -->
        <path d="M10 35 L13 32 L10 29 L7 32 Z" fill="#FFD93D"/>
        <path d="M90 30 L93 27 L90 24 L87 27 Z" fill="#FFD93D"/>
      </symbol>

      <!-- Hungry/Pleading face - hands clasped begging -->
      <symbol id="face-hungry" viewBox="-10 -5 120 115">
        <!-- Body - droopy pleading blob -->
        <path d="M28 25 Q52 15 72 28 Q88 42 85 62 Q80 85 60 90 Q38 95 22 82 Q8 68 15 48 Q20 32 28 25Z" fill="#FF7A50"/>
        <!-- Legs -->
        <line x1="38" y1="88" x2="40" y2="102" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <line x1="62" y1="88" x2="60" y2="102" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="40" cy="104" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="60" cy="104" rx="6" ry="4" fill="#E5673D"/>
        <!-- Arms - clasped begging -->
        <line x1="18" y1="52" x2="38" y2="75" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <line x1="82" y1="52" x2="62" y2="75" stroke="#E5673D" stroke-width="6" stroke-linecap="round"/>
        <circle cx="42" cy="78" r="5" fill="#E5673D"/>
        <circle cx="58" cy="78" r="5" fill="#E5673D"/>
        <!-- Face - puppy eyes -->
        <circle cx="38" cy="45" r="9" fill="#FFFFFF"/>
        <circle cx="62" cy="43" r="9" fill="#FFFFFF"/>
        <circle cx="40" cy="48" r="4.5" fill="#2D2A26"/>
        <circle cx="64" cy="46" r="4.5" fill="#2D2A26"/>
        <circle cx="42" cy="46" r="1.5" fill="#FFFFFF"/>
        <circle cx="66" cy="44" r="1.5" fill="#FFFFFF"/>
        <!-- Worried eyebrows -->
        <path d="M25 35 Q38 30 50 40" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M75 33 Q62 28 50 38" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Sad pout -->
        <ellipse cx="50" cy="62" rx="6" ry="5" fill="#2D2A26"/>
      </symbol>

      <!-- Coffee icon -->
      <symbol id="icon-coffee" viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>

      <!-- Heart icon -->
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/>
      </symbol>

      <!-- Key icon -->
      <symbol id="icon-key" viewBox="0 0 24 24">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <!-- Star icon -->
      <symbol id="icon-star" viewBox="0 0 24 24">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Character -->
    <div class="character-section">
      <div class="character" id="character">
        <svg><use href="#face-hungry"/></svg>
      </div>
      <p class="character-status" id="status-text">Jesty is hungry...</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="roast-count">0</span>
        <span class="stat-label">roasts served</span>
      </div>
    </div>

    <!-- Support Options -->
    <div class="support-section">
      <a href="https://ko-fi.com/jesty" target="_blank" class="support-btn primary">
        <svg class="btn-icon"><use href="#icon-coffee"/></svg>
        Buy Jesty a coffee
      </a>

      <a href="#" class="support-btn secondary" id="premium-btn">
        <svg class="btn-icon"><use href="#icon-star"/></svg>
        Go Premium
        <span class="badge">Soon</span>
      </a>

      <button class="support-btn tertiary" id="byok-btn">
        <svg class="btn-icon"><use href="#icon-key"/></svg>
        Use your own API key
      </button>
    </div>

    <!-- BYOK Panel (hidden by default) -->
    <div class="byok-panel hidden" id="byok-panel">
      <p class="byok-description">Add your OpenAI API key for unlimited roasts</p>
      <input type="password" id="api-key-input" class="api-input" placeholder="sk-...">
      <div class="byok-actions">
        <button class="btn-save" id="save-key-btn">Save</button>
        <button class="btn-cancel" id="cancel-key-btn">Cancel</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Every coffee keeps Jesty roasting</p>
      <svg class="footer-heart"><use href="#icon-heart"/></svg>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>

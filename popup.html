<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG Character Definitions - Dumb Ways to Die style -->
  <svg style="display: none;">
    <defs>
      <!-- Happy/Fed face -->
      <symbol id="face-happy" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Closed happy eyes -->
        <path d="M22 44 Q28 38 34 44" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M46 44 Q52 38 58 44" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Big smile -->
        <path d="M25 62 Q40 78 55 62" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Blush -->
        <circle cx="20" cy="55" r="5" fill="#E5673D" opacity="0.4"/>
        <circle cx="60" cy="55" r="5" fill="#E5673D" opacity="0.4"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Hungry/Pleading face -->
      <symbol id="face-hungry" viewBox="0 0 80 100">
        <ellipse cx="40" cy="55" rx="32" ry="42" fill="#FF7A50"/>
        <!-- Big puppy eyes -->
        <circle cx="28" cy="44" r="7" fill="#FFFFFF"/>
        <circle cx="52" cy="44" r="7" fill="#FFFFFF"/>
        <circle cx="30" cy="44" r="4" fill="#2D2A26"/>
        <circle cx="54" cy="44" r="4" fill="#2D2A26"/>
        <circle cx="31" cy="43" r="1.5" fill="#FFFFFF"/>
        <circle cx="55" cy="43" r="1.5" fill="#FFFFFF"/>
        <!-- Raised eyebrows -->
        <path d="M18 32 Q28 28 38 34" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M62 32 Q52 28 42 34" stroke="#2D2A26" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Small pout -->
        <ellipse cx="40" cy="68" rx="6" ry="4" fill="#2D2A26"/>
        <ellipse cx="30" cy="95" rx="6" ry="4" fill="#E5673D"/>
        <ellipse cx="50" cy="95" rx="6" ry="4" fill="#E5673D"/>
      </symbol>

      <!-- Coffee icon -->
      <symbol id="icon-coffee" viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>

      <!-- Heart icon -->
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/>
      </symbol>

      <!-- Key icon -->
      <symbol id="icon-key" viewBox="0 0 24 24">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <!-- Star icon -->
      <symbol id="icon-star" viewBox="0 0 24 24">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Character -->
    <div class="character-section">
      <div class="character" id="character">
        <svg><use href="#face-hungry"/></svg>
      </div>
      <p class="character-status" id="status-text">Jesty is hungry...</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="roast-count">0</span>
        <span class="stat-label">roasts served</span>
      </div>
    </div>

    <!-- Support Options -->
    <div class="support-section">
      <a href="https://ko-fi.com/jesty" target="_blank" class="support-btn primary">
        <svg class="btn-icon"><use href="#icon-coffee"/></svg>
        Buy Jesty a coffee
      </a>

      <a href="#" class="support-btn secondary" id="premium-btn">
        <svg class="btn-icon"><use href="#icon-star"/></svg>
        Go Premium
        <span class="badge">Soon</span>
      </a>

      <button class="support-btn tertiary" id="byok-btn">
        <svg class="btn-icon"><use href="#icon-key"/></svg>
        Use your own API key
      </button>
    </div>

    <!-- BYOK Panel (hidden by default) -->
    <div class="byok-panel hidden" id="byok-panel">
      <p class="byok-description">Add your OpenAI API key for unlimited roasts</p>
      <input type="password" id="api-key-input" class="api-input" placeholder="sk-...">
      <div class="byok-actions">
        <button class="btn-save" id="save-key-btn">Save</button>
        <button class="btn-cancel" id="cancel-key-btn">Cancel</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Every coffee keeps Jesty roasting</p>
      <svg class="footer-heart"><use href="#icon-heart"/></svg>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Jesty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG Character Definitions - Organic blob style with clip-path shading and mitten hands -->
  <svg style="display: none;">
    <defs>
      <!-- Happy/Fed face - organic blob with mitten hands -->
      <symbol id="face-happy" viewBox="-15 -10 150 140">
        <defs><clipPath id="clip-happy"><path d="M44 12 C22 14, 12 30, 14 50 C15 62, 12 76, 16 90 C22 106, 42 112, 60 114 C78 112, 98 106, 104 90 C108 76, 105 62, 106 50 C108 30, 98 14, 76 12 Z"/></clipPath></defs>
        <path d="M44 12 C22 14, 12 30, 14 50 C15 62, 12 76, 16 90 C22 106, 42 112, 60 114 C78 112, 98 106, 104 90 C108 76, 105 62, 106 50 C108 30, 98 14, 76 12 Z" fill="#EBF34F"/>
        <g clip-path="url(#clip-happy)"><ellipse cx="60" cy="98" rx="36" ry="18" fill="#8A9618" opacity="0.15"/><ellipse cx="56" cy="24" rx="28" ry="16" fill="#F8FBCE" opacity="0.22"/></g>
        <path d="M18 52 C6 40, -4 24, -2 12 C0 6, 6 4, 8 10" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="8" cy="10" rx="7" ry="5" fill="#C8D132" transform="rotate(-35, 8, 10)"/>
        <path d="M102 52 C114 40, 124 24, 122 12 C120 6, 114 4, 112 10" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="112" cy="10" rx="7" ry="5" fill="#C8D132" transform="rotate(35, 112, 10)"/>
        <path d="M44 110 C38 114, 34 116, 36 118" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="36" cy="118" rx="7" ry="4" fill="#C8D132" transform="rotate(-10, 36, 118)"/>
        <path d="M76 110 C82 114, 86 116, 84 118" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="84" cy="118" rx="7" ry="4" fill="#C8D132" transform="rotate(10, 84, 118)"/>
        <circle cx="46" cy="48" r="9" fill="#FFFFFF"/>
        <circle cx="47" cy="49" r="4.5" fill="#2D2A26"/><circle cx="44" cy="45" r="2" fill="#FFFFFF"/><circle cx="49" cy="48" r="1" fill="#FFFFFF"/>
        <circle cx="74" cy="48" r="9" fill="#FFFFFF"/>
        <circle cx="75" cy="49" r="4.5" fill="#2D2A26"/><circle cx="72" cy="45" r="2" fill="#FFFFFF"/><circle cx="77" cy="48" r="1" fill="#FFFFFF"/>
        <path d="M36 36 C40 32, 50 32, 54 36" stroke="#2D2A26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M66 36 C70 32, 78 32, 82 36" stroke="#2D2A26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="34" cy="58" rx="8" ry="5" fill="#FF8FA3" opacity="0.6"/>
        <ellipse cx="86" cy="58" rx="8" ry="5" fill="#FF8FA3" opacity="0.6"/>
        <path d="M44 64 C50 72, 62 74, 76 64" stroke="#2D2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M6 36 L8 30 L10 36 L16 34 L10 36 L12 42 L8 36 L4 38 Z" fill="#FFD93D"/>
        <path d="M110 32 L112 26 L114 32 L120 30 L114 32 L116 38 L112 32 L108 34 Z" fill="#FFD93D"/>
        <path d="M58 0 L59 -4 L60 0 L64 -1 L60 0 L61 4 L59 0 L56 1 Z" fill="#FFD93D"/>
        <path d="M-4 54 L-2 50 L0 54 L4 53 L0 54 L1 58 L-2 54 L-5 55 Z" fill="#FFD93D" opacity="0.7"/>
        <path d="M120 52 L122 48 L124 52 L128 51 L124 52 L125 56 L122 52 L118 53 Z" fill="#FFD93D" opacity="0.7"/>
        <path d="M26 10 L27 7 L28 10 L31 9 L28 10 L29 13 L27 10 L24 11 Z" fill="#FFD93D" opacity="0.6"/>
        <path d="M92 6 L93 3 L94 6 L97 5 L94 6 L95 9 L93 6 L90 7 Z" fill="#FFD93D" opacity="0.6"/>
        <circle cx="14" cy="20" r="2" fill="#FF8FA3" opacity="0.5"/>
        <circle cx="106" cy="16" r="2" fill="#87CEEB" opacity="0.5"/>
        <circle cx="30" cy="2" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="88" cy="-2" r="1.5" fill="#FF8FA3" opacity="0.5"/>
        <circle cx="124" cy="40" r="1.5" fill="#FFD93D" opacity="0.4"/>
        <circle cx="-6" cy="44" r="1.5" fill="#87CEEB" opacity="0.4"/>
      </symbol>

      <!-- Hungry/Pleading face - organic blob with mitten hands -->
      <symbol id="face-hungry" viewBox="-15 -10 150 140">
        <defs><clipPath id="clip-hungry"><path d="M48 20 C32 22, 24 36, 26 52 C27 64, 24 76, 28 90 C32 104, 48 110, 62 112 C76 110, 90 102, 92 88 C94 76, 92 64, 90 52 C88 36, 78 20, 66 20 Z" transform="rotate(4, 60, 65)"/></clipPath></defs>
        <path d="M48 20 C32 22, 24 36, 26 52 C27 64, 24 76, 28 90 C32 104, 48 110, 62 112 C76 110, 90 102, 92 88 C94 76, 92 64, 90 52 C88 36, 78 20, 66 20 Z" fill="#EBF34F" transform="rotate(4, 60, 65)"/>
        <g clip-path="url(#clip-hungry)"><ellipse cx="58" cy="94" rx="28" ry="16" fill="#8A9618" opacity="0.15" transform="rotate(4, 60, 65)"/><ellipse cx="56" cy="32" rx="20" ry="14" fill="#F8FBCE" opacity="0.22" transform="rotate(4, 60, 65)"/></g>
        <path d="M30 58 C18 56, 10 62, 18 72 C26 80, 44 78, 52 74" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="52" cy="74" rx="7" ry="5" fill="#C8D132" transform="rotate(-15, 52, 74)"/>
        <path d="M88 58 C100 56, 108 62, 100 72 C92 80, 74 78, 66 74" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="66" cy="74" rx="7" ry="5" fill="#C8D132" transform="rotate(15, 66, 74)"/>
        <path d="M44 108 C40 112, 36 116, 38 118" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="38" cy="118" rx="7" ry="4" fill="#C8D132" transform="rotate(-10, 38, 118)"/>
        <path d="M74 108 C78 112, 82 116, 80 118" stroke="#C8D132" stroke-width="7" fill="none" stroke-linecap="round"/>
        <ellipse cx="80" cy="118" rx="7" ry="4" fill="#C8D132" transform="rotate(10, 80, 118)"/>
        <circle cx="46" cy="46" r="12" fill="#FFFFFF"/>
        <circle cx="48" cy="48" r="6" fill="#2D2A26"/><circle cx="44" cy="42" r="3" fill="#FFFFFF"/><circle cx="50" cy="46" r="1.5" fill="#FFFFFF"/>
        <circle cx="72" cy="46" r="12" fill="#FFFFFF"/>
        <circle cx="74" cy="48" r="6" fill="#2D2A26"/><circle cx="70" cy="42" r="3" fill="#FFFFFF"/><circle cx="76" cy="46" r="1.5" fill="#FFFFFF"/>
        <path d="M36 30 C40 26, 48 26, 54 30" stroke="#2D2A26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M64 30 C70 26, 78 26, 82 30" stroke="#2D2A26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="59" cy="64" rx="5" ry="3.5" fill="#2D2A26"/>
      </symbol>

      <!-- Coffee icon -->
      <symbol id="icon-coffee" viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>

      <!-- Heart icon -->
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/>
      </symbol>

      <!-- Star icon -->
      <symbol id="icon-star" viewBox="0 0 24 24">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <div class="container">
    <!-- Character -->
    <div class="character-section">
      <div class="character" id="character">
        <svg><use href="#face-hungry"/></svg>
      </div>
      <p class="character-status" id="status-text">Jesty is hungry...</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="roast-count">0</span>
        <span class="stat-label">roasts served</span>
      </div>
    </div>

    <!-- Support Options -->
    <div class="support-section">
      <a href="https://ko-fi.com/jesty" target="_blank" class="support-btn primary">
        <svg class="btn-icon"><use href="#icon-coffee"/></svg>
        Buy Jesty a coffee
      </a>

      <a href="#" class="support-btn secondary" id="premium-btn">
        <svg class="btn-icon"><use href="#icon-star"/></svg>
        Plead Guilty
        <span class="badge">Soon</span>
      </a>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Every coffee keeps Jesty roasting</p>
      <svg class="footer-heart"><use href="#icon-heart"/></svg>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesty Character Sheet</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF8F5;
      color: #1C1917;
      padding: 40px 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #9C968F;
      margin-bottom: 32px;
    }

    .color-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .color-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #DDD9D5;
      background: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #6B6560;
      transition: all 0.2s;
    }

    .color-tab:hover {
      border-color: #CCC7C2;
    }

    .color-tab.active {
      border-color: #1C1917;
      color: #1C1917;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px 12px;
      background: #FFFFFF;
      border-radius: 14px;
      border: 1px solid #DDD9D5;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: #CCC7C2;
    }

    .card svg {
      width: 80px;
      height: 74px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      color: #1C1917;
      text-transform: capitalize;
    }

    .card-tier {
      font-size: 10px;
      font-weight: 600;
      color: #9C968F;
      background: #F0EDEA;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .card-download {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #9C968F;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      transition: color 0.15s;
    }

    .card-download:hover {
      color: #1C1917;
    }
  </style>
</head>
<body>
  <h1>Character Sheet</h1>
  <p class="subtitle">15 expressions &times; 6 colors &mdash; click to download SVG</p>

  <div class="color-tabs" id="color-tabs"></div>
  <div class="grid" id="grid"></div>

  <script src="characters.js"></script>
  <script>
    const COLORS = [
      { label: 'Lime',   body: '#EBF34F', limb: '#C8D132', shadow: '#8A9618', highlight: '#F8FBCE' },
      { label: 'Pink',   body: '#FF8FA3', limb: '#E0637A', shadow: '#B84D60', highlight: '#FFD4DC' },
      { label: 'Sky',    body: '#87CEEB', limb: '#5BAED4', shadow: '#3A8CB5', highlight: '#C8E8F5' },
      { label: 'Purple', body: '#A78BFA', limb: '#7C5FD6', shadow: '#5B3FB5', highlight: '#D4C8FD' },
      { label: 'Mint',   body: '#34D399', limb: '#1EB57F', shadow: '#15875F', highlight: '#A7F0D4' },
      { label: 'Peach',  body: '#FDBA74', limb: '#E09550', shadow: '#B87638', highlight: '#FEE0C0' },
    ];

    const SOURCE = { body: '#EBF34F', limb: '#C8D132', shadow: '#8A9618', highlight: '#F8FBCE' };

    const EXPRESSIONS = [
      { name: 'smug',         tier: 'Free' },
      { name: 'suspicious',   tier: 'Free' },
      { name: 'yikes',        tier: 'Free' },
      { name: 'eyeroll',      tier: 'Free' },
      { name: 'disappointed', tier: 'Free' },
      { name: 'melting',      tier: 'Free' },
      { name: 'dead',         tier: 'Free' },
      { name: 'thinking',     tier: 'System' },
      { name: 'happy',        tier: 'System' },
      { name: 'impressed',    tier: 'Guilty' },
      { name: 'manic',        tier: 'Guilty' },
      { name: 'petty',        tier: 'Guilty' },
      { name: 'chaotic',      tier: 'Sentenced' },
      { name: 'dramatic',     tier: 'Sentenced' },
      { name: 'tender',       tier: 'Sentenced' },
    ];

    let activeColor = COLORS[0];

    // Init symbols
    JestyCharacters.init();

    function recolorSvgClone(svgEl, from, to) {
      const replacements = {};
      for (const key of ['body', 'limb', 'shadow', 'highlight']) {
        replacements[from[key].toUpperCase()] = to[key];
      }
      svgEl.querySelectorAll('*').forEach(el => {
        for (const attr of ['fill', 'stroke']) {
          const val = el.getAttribute(attr);
          if (val && replacements[val.toUpperCase()]) {
            el.setAttribute(attr, replacements[val.toUpperCase()]);
          }
        }
      });
    }

    function buildSvgForExpression(expr, color) {
      const symbol = document.getElementById(`face-${expr}`);
      if (!symbol) return null;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svg.setAttribute('viewBox', '-15 -10 150 140');
      svg.setAttribute('width', '300');
      svg.setAttribute('height', '280');

      // Clone symbol content, fix clip-path IDs to avoid collisions
      let content = symbol.innerHTML;
      const suffix = `${expr}-${color.label}`;
      content = content.replace(/id="clip-([^"]+)"/g, `id="clip-$1-${suffix}"`);
      content = content.replace(/url\(#clip-([^)]+)\)/g, `url(#clip-$1-${suffix})`);
      svg.innerHTML = content;

      if (color.label !== 'Lime') {
        recolorSvgClone(svg, SOURCE, color);
      }

      return svg;
    }

    function downloadSvg(expr, color) {
      const svg = buildSvgForExpression(expr, color);
      if (!svg) return;

      const serializer = new XMLSerializer();
      const str = serializer.serializeToString(svg);
      const blob = new Blob([str], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `jesty-${expr}-${color.label.toLowerCase()}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function renderTabs() {
      const tabs = document.getElementById('color-tabs');
      tabs.innerHTML = '';
      COLORS.forEach(c => {
        const btn = document.createElement('button');
        btn.className = `color-tab${c.label === activeColor.label ? ' active' : ''}`;
        btn.innerHTML = `<span class="color-dot" style="background:${c.body}"></span>${c.label}`;
        btn.addEventListener('click', () => {
          activeColor = c;
          renderTabs();
          renderGrid();
        });
        tabs.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      EXPRESSIONS.forEach(expr => {
        const card = document.createElement('div');
        card.className = 'card';

        const svg = buildSvgForExpression(expr.name, activeColor);
        if (svg) {
          svg.removeAttribute('width');
          svg.removeAttribute('height');
          card.appendChild(svg);
        }

        const label = document.createElement('span');
        label.className = 'card-label';
        label.textContent = expr.name;
        card.appendChild(label);

        const tier = document.createElement('span');
        tier.className = 'card-tier';
        tier.textContent = expr.tier;
        card.appendChild(tier);

        const dl = document.createElement('button');
        dl.className = 'card-download';
        dl.textContent = 'Download SVG';
        dl.addEventListener('click', () => downloadSvg(expr.name, activeColor));
        card.appendChild(dl);

        grid.appendChild(card);
      });
    }

    renderTabs();
    renderGrid();
  </script>
</body>
</html>
